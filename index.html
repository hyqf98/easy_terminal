<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Terminal</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app-resize-handles" aria-hidden="true">
      <div class="app-resize-handle app-resize-handle-n" data-resize-direction="North"></div>
      <div class="app-resize-handle app-resize-handle-s" data-resize-direction="South"></div>
      <div class="app-resize-handle app-resize-handle-e" data-resize-direction="East"></div>
      <div class="app-resize-handle app-resize-handle-w" data-resize-direction="West"></div>
      <div class="app-resize-handle app-resize-handle-ne" data-resize-direction="NorthEast"></div>
      <div class="app-resize-handle app-resize-handle-nw" data-resize-direction="NorthWest"></div>
      <div class="app-resize-handle app-resize-handle-se" data-resize-direction="SouthEast"></div>
      <div class="app-resize-handle app-resize-handle-sw" data-resize-direction="SouthWest"></div>
    </div>
    <div id="app-titlebar">
      <div class="app-titlebar-drag">
        <span class="app-title">
          <img src="/src/assets/app-icon.svg" alt="Easy Terminal" />
          Easy Terminal
        </span>
      </div>
      <div class="app-window-controls">
        <button class="app-btn-minimize" id="app-minimize" title="Minimize"></button>
        <button class="app-btn-maximize" id="app-maximize" title="Maximize"></button>
        <button class="app-btn-close" id="app-close" title="Close"></button>
      </div>
    </div>
    <div id="app-body">
      <div id="sidebar-container"></div>
      <div id="panel-area">
        <div id="panel-files" class="panel-content"></div>
        <div id="panel-commands" class="panel-content"></div>
        <div id="panel-market" class="panel-content"></div>
        <div id="panel-history" class="panel-content"></div>
        <div id="panel-mappings" class="panel-content"></div>
        <div id="panel-ssh" class="panel-content"></div>
        <div id="panel-shortcuts" class="panel-content"></div>
        <div id="panel-settings" class="panel-content"></div>
      </div>
      <div id="app-viewport">
        <div id="canvas">
          <div id="selection-rect"></div>
        </div>
      </div>
    </div>
  </body>
</html>
